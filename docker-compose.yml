services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: dib-finance-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
